<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Listener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="music-data.js" defer></script>
<style>
  :root{
    --bg:#0a0a0b;
    --bg-radial:#160306;
    --surface:#151517;
    --surface-2:#1c1c1f;
    --surface-3:#232326;
    --border:rgba(255,255,255,.08);
    --border-soft:rgba(255,255,255,.05);
    --red:#e63946;
    --red-dim:#7d1f28;
    --red-deep:#4a1116;
    --red-glow:rgba(230,57,70,.35);
    --text:#f7f6f5;
    --text-dim:#96959a;
    --text-faint:#5c5b60;
    --font-display:'Unbounded', sans-serif;
    --font-body:'Plus Jakarta Sans', sans-serif;
    --safe-top:env(safe-area-inset-top, 18px);
    --safe-bottom:env(safe-area-inset-bottom, 14px);
    --ease:cubic-bezier(.16,1,.3,1);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;outline:none;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100dvh;width:100vw;overflow:hidden;-webkit-font-smoothing:antialiased;}
  body{display:flex;justify-content:center;align-items:center;}
  input,textarea{user-select:text;}
  img{-webkit-user-drag:none;}
  button{font-family:inherit;cursor:pointer;}

  /* ---------------- LOADER ---------------- */
  .loader{
    position:fixed;inset:0;z-index:999;
    background:radial-gradient(circle at 50% 28%, var(--bg-radial) 0%, #050506 60%, #000 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    transition:opacity .5s var(--ease), visibility .5s;
  }
  .loader.hide{opacity:0;visibility:hidden;pointer-events:none;}
  .loader-mark{
    width:56px;height:56px;border-radius:18px;
    background:linear-gradient(150deg,var(--red) 0%, var(--red-deep) 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:700;font-size:1.5rem;color:#fff;
    box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 18px 40px rgba(230,57,70,.25);
    position:relative;overflow:hidden;
  }
  .loader-mark::after{
    content:'';position:absolute;inset:-60%;
    background:conic-gradient(from 0deg, transparent, rgba(255,255,255,.35), transparent 30%);
    animation:spin 2.2s linear infinite;
  }
  .loader-word{font-family:var(--font-display);font-weight:700;font-size:1.05rem;letter-spacing:.5px;}
  .loader-word span{color:var(--red);}
  .loader-track{width:120px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:4px;}
  .loader-fill{height:100%;width:0%;background:var(--red);box-shadow:0 0 10px var(--red-glow);animation:fill 1.3s var(--ease) forwards;}
  @keyframes fill{to{width:100%;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------------- SHELL ---------------- */
  .app-shell{
    position:relative;width:100%;max-width:460px;height:100dvh;
    background:var(--bg);overflow:hidden;
  }

  .view{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    background:var(--bg);
    transform:translateX(100%);
    transition:transform .42s var(--ease);
    z-index:1;
  }
  .view.pos-center{transform:translateX(0);z-index:3;}
  .view.pos-left{transform:translateX(-100%);z-index:2;}
  .view.pos-right{transform:translateX(100%);z-index:2;}

  .scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .scroll-body::-webkit-scrollbar{width:0;}

  /* ---------------- HOME VIEW ---------------- */
  .home-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--safe-top) + 8px) 20px 4px;
  }
  .brand-id{display:flex;align-items:center;gap:11px;}
  .avatar-mark{
    width:38px;height:38px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(150deg,var(--red) 0%, var(--red-deep) 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:700;font-size:1rem;color:#fff;
  }
  .brand-title{font-family:var(--font-display);font-weight:700;font-size:1.02rem;letter-spacing:.3px;}
  .brand-sub{font-size:.68rem;color:var(--text-faint);font-weight:500;margin-top:1px;letter-spacing:.3px;}
  .note-icon{color:var(--red);width:19px;height:19px;}

  .search-wrap{position:relative;margin:18px 20px 22px;}
  .search-wrap svg,.search-wrap i{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--text-faint);pointer-events:none;}
  #search-input{
    width:100%;padding:14px 44px 14px 18px;border-radius:16px;
    background:var(--surface);border:1px solid var(--border);
    color:var(--text);font-family:var(--font-body);font-size:.88rem;font-weight:500;
  }
  #search-input::placeholder{color:var(--text-faint);}

  .section-label{font-size:.72rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);padding:0 20px;margin-bottom:12px;}

  .albums-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:0 20px;}
  .album-card{
    position:relative;border-radius:20px;overflow:hidden;aspect-ratio:1/1;
    background:var(--surface);border:1px solid var(--border);
    transition:transform .2s var(--ease);
  }
  .album-card:active{transform:scale(.96);}
  .album-card img{width:100%;height:100%;object-fit:cover;display:block;}
  .album-card .card-shade{position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,0) 55%);}
  .album-card .card-label{position:absolute;left:12px;right:12px;bottom:11px;font-family:var(--font-display);font-weight:600;font-size:.86rem;line-height:1.2;}
  .album-card .card-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);padding:4px 9px;border-radius:20px;font-size:.62rem;font-weight:600;color:var(--text-dim);}

  .no-results{grid-column:1/-1;text-align:center;color:var(--text-faint);font-size:.85rem;padding:30px 10px;}

  .artist-cta{text-align:center;margin:34px 20px 6px;padding-top:22px;border-top:1px solid var(--border-soft);}
  .artist-cta p{color:var(--text-dim);font-size:.8rem;font-weight:500;margin-bottom:14px;}
  .feature-btn{
    display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:30px;
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    font-weight:700;font-size:.82rem;transition:transform .2s var(--ease), background .2s var(--ease);
  }
  .feature-btn:active{transform:scale(.95);background:var(--red-dim);}
  .feature-btn svg{width:15px;height:15px;color:var(--red);}

  .bottom-spacer{height:120px;}

  /* ---------------- MINI PLAYER ---------------- */
  .mini-player{
    position:absolute;left:14px;right:14px;bottom:calc(14px + var(--safe-bottom));
    background:var(--surface-2);border:1px solid var(--border);border-radius:20px;
    padding:11px 12px 11px 11px;display:flex;align-items:center;gap:11px;
    box-shadow:0 20px 45px rgba(0,0,0,.55);z-index:20;
    transform:translateY(160%);transition:transform .4s var(--ease);
    overflow:hidden;
  }
  .mini-player.visible{transform:translateY(0);}
  .mini-progress{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.06);}
  .mini-progress-fill{height:100%;width:0%;background:var(--red);box-shadow:0 0 8px var(--red-glow);transition:width .15s linear;}
  .mini-thumb{width:42px;height:42px;border-radius:11px;object-fit:cover;flex-shrink:0;}
  .mini-info{flex:1;min-width:0;}
  .mini-title{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mini-artist{font-size:.72rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .mini-controls{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .mini-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:none;color:var(--text);display:flex;align-items:center;justify-content:center;}
  .mini-btn:active{transform:scale(.85);}
  .mini-btn svg{width:16px;height:16px;}
  .mini-play{width:36px;height:36px;border-radius:50%;background:var(--red);color:#fff;}
  .mini-play svg{width:16px;height:16px;fill:#fff;}

  /* ---------------- ALBUM VIEW ---------------- */
  .sub-header{display:flex;align-items:center;gap:14px;padding:calc(var(--safe-top) + 8px) 20px 6px;}
  .back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;}
  .back-btn:active{transform:scale(.9);}
  .back-btn svg{width:18px;height:18px;}
  .sub-header-title{font-family:var(--font-display);font-weight:600;font-size:.9rem;color:var(--text-dim);}

  .album-hero{display:flex;flex-direction:column;align-items:center;padding:14px 20px 22px;text-align:center;}
  .album-hero img{width:44vw;max-width:190px;aspect-ratio:1/1;object-fit:cover;border-radius:26px;box-shadow:0 25px 50px rgba(0,0,0,.6);border:1px solid var(--border);}
  .album-hero h1{font-family:var(--font-display);font-weight:700;font-size:1.3rem;margin-top:18px;letter-spacing:.2px;}
  .album-hero p{color:var(--text-dim);font-size:.82rem;margin-top:6px;font-weight:500;}

  .song-list{padding:4px 16px 130px 20px;}
  .song-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 10px;border-radius:16px;margin-bottom:4px;
    border:1px solid transparent;transition:background .2s var(--ease), border-color .2s var(--ease);
  }
  .song-row:active{background:rgba(255,255,255,.05);}
  .song-row.is-playing{background:rgba(230,57,70,.08);border-color:rgba(230,57,70,.2);}
  .song-left{display:flex;align-items:center;gap:13px;min-width:0;}
  .song-num{width:20px;text-align:center;font-size:.78rem;color:var(--text-faint);font-weight:600;flex-shrink:0;}
  .song-row.is-playing .song-num{color:var(--red);}
  .song-thumb{width:44px;height:44px;border-radius:11px;object-fit:cover;flex-shrink:0;}
  .song-meta{min-width:0;}
  .song-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .song-row.is-playing .song-title{color:var(--red);}
  .song-artist{font-size:.76rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .song-pulse{width:16px;height:16px;color:var(--red);flex-shrink:0;display:none;}
  .song-row.is-playing .song-pulse{display:block;animation:pulse 1.1s infinite alternate;}
  @keyframes pulse{0%{opacity:.4;}100%{opacity:1;}}

  /* ---------------- PLAYER VIEW ---------------- */
  .player-top{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 8px) 20px 0;}
  .explore-pill{
    display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:30px;
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    font-size:.76rem;font-weight:700;letter-spacing:.2px;
  }
  .explore-pill:active{transform:scale(.95);background:var(--surface-2);}
  .explore-pill svg{width:13px;height:13px;color:var(--red);}

  .player-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:0 24px calc(var(--safe-bottom) + 8px);min-height:0;}

  .artwork-arena{flex:1;display:flex;align-items:center;justify-content:center;min-height:200px;position:relative;}
  .artwork-frame{
    width:76vw;height:76vw;max-width:300px;max-height:300px;border-radius:34px;
    overflow:hidden;position:relative;border:1px solid var(--border);
    box-shadow:0 30px 60px rgba(0,0,0,.7);transition:box-shadow .5s var(--ease);
  }
  .artwork-frame.playing{box-shadow:0 30px 60px rgba(0,0,0,.75), 0 0 46px var(--red-glow);}
  .artwork-frame img{width:100%;height:100%;object-fit:cover;}
  .buffer-spinner{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.15);
    border-top-color:var(--red);opacity:0;transition:opacity .25s;animation:spin .8s linear infinite;
  }
  .artwork-frame.buffering .buffer-spinner{opacity:1;}

  .track-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:22px 0 20px;}
  .track-meta{min-width:0;}
  .track-title{font-family:var(--font-display);font-weight:600;font-size:1.28rem;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .2s;}
  .track-artist{font-size:.9rem;color:var(--text-dim);font-weight:500;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fav-btn{background:none;border:none;color:var(--text-dim);flex-shrink:0;}
  .fav-btn svg{width:22px;height:22px;}
  .fav-btn.active{color:var(--red);}
  .fav-btn.active svg{fill:var(--red);}

  .scrub-wrap{margin-bottom:18px;}
  .time-row{display:flex;justify-content:space-between;font-size:.72rem;font-weight:600;color:var(--text-faint);margin-bottom:8px;font-variant-numeric:tabular-nums;}
  .range-wrap{position:relative;height:16px;display:flex;align-items:center;}
  input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:4px;position:absolute;z-index:5;cursor:pointer;}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(0,0,0,.7);transition:transform .15s var(--ease);}
  input[type="range"]:active::-webkit-slider-thumb{transform:scale(1.35);}
  .range-fill{position:absolute;left:0;top:6px;height:4px;background:var(--red);border-radius:4px;width:0%;pointer-events:none;box-shadow:0 0 10px var(--red-glow);}

  .controls-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .ctrl-util,.ctrl-nav{background:none;border:none;color:var(--text-dim);display:flex;align-items:center;justify-content:center;}
  .ctrl-util:active,.ctrl-nav:active{transform:scale(.88);}
  .ctrl-util.active{color:var(--red);}
  .ctrl-util svg{width:20px;height:20px;}
  .ctrl-nav{color:var(--text);}
  .ctrl-nav svg{width:28px;height:28px;}
  .ctrl-play{
    width:68px;height:68px;border-radius:50%;background:var(--red);border:none;color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:0 14px 32px var(--red-glow);
    transition:transform .25s var(--ease);
  }
  .ctrl-play:active{transform:scale(.9);}
  .ctrl-play svg{width:26px;height:26px;fill:#fff;}

  .player-tag{text-align:center;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);}

  .empty-state{text-align:center;color:var(--text-faint);font-size:.85rem;padding:60px 20px;}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-mark">♬</div>
  <div class="loader-word">Listener<span>.</span></div>
  <div class="loader-track"><div class="loader-fill"></div></div>
</div>

<div class="app-shell">

  <!-- ============ HOME VIEW ============ -->
  <section class="view pos-center" id="view-home">
    <div class="scroll-body">
      <header class="home-header">
        <div class="brand-id">
          <div class="avatar-mark">♬</div>
          <div>
            <div class="brand-title">Home Page</div>
            <div class="brand-sub">Smooth Playbacks studio</div>
          </div>
        </div>
        <i data-lucide="music-2" class="note-icon"></i>
      </header>

      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search music &amp; albums" autocomplete="off">
        <i data-lucide="search"></i>
      </div>

      <div class="section-label">Albums</div>
      <div class="albums-grid" id="albums-grid"></div>

      <div class="artist-cta">
        <p>Are you an artist?</p>
        <button class="feature-btn" id="feature-btn">
          <i data-lucide="upload"></i>
          Feature your song on Listener
        </button>
      </div>

      <div class="bottom-spacer"></div>
    </div>
  </section>

  <!-- ============ ALBUM VIEW ============ -->
  <section class="view pos-right" id="view-album">
    <div class="sub-header">
      <button class="back-btn" id="album-back"><i data-lucide="chevron-left"></i></button>
      <div class="sub-header-title">Album</div>
    </div>
    <div class="scroll-body">
      <div class="album-hero">
        <img id="album-hero-img" src="" alt="">
        <h1 id="album-hero-title">—</h1>
        <p id="album-hero-sub">—</p>
      </div>
      <div class="song-list" id="song-list"></div>
    </div>
  </section>

  <!-- ============ PLAYER VIEW ============ -->
  <section class="view pos-right" id="view-player">
    <div class="player-top">
      <button class="back-btn" id="player-back"><i data-lucide="chevron-down"></i></button>
      <button class="explore-pill" id="explore-albums-btn">
        <i data-lucide="layout-grid"></i>
        Explore Albums
      </button>
      <div style="width:36px;"></div>
    </div>

    <div class="player-body">
      <div class="artwork-arena">
        <div class="artwork-frame" id="artwork-frame">
          <img id="player-artwork" src="" alt="">
          <div class="buffer-spinner" id="buffer-spinner"></div>
        </div>
      </div>

      <div class="track-row">
        <div class="track-meta">
          <div class="track-title" id="player-title">—</div>
          <div class="track-artist" id="player-artist">—</div>
        </div>
        <button class="fav-btn" id="fav-btn"><i data-lucide="heart"></i></button>
      </div>

      <div class="scrub-wrap">
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
        <div class="range-wrap">
          <input type="range" id="seek-slider" min="0" max="100" value="0" step="0.1">
          <div class="range-fill" id="range-fill"></div>
        </div>
      </div>

      <div class="controls-row">
        <button class="ctrl-util" id="btn-shuffle"><i data-lucide="shuffle"></i></button>
        <button class="ctrl-nav" id="btn-prev"><i data-lucide="skip-back"></i></button>
        <button class="ctrl-play" id="btn-play"><i data-lucide="play" id="play-icon"></i></button>
        <button class="ctrl-nav" id="btn-next"><i data-lucide="skip-forward"></i></button>
        <button class="ctrl-util" id="btn-repeat"><i data-lucide="repeat"></i></button>
      </div>

      <div class="player-tag">Smooth playbacks &amp; no ads</div>
    </div>
  </section>

</div>

<!-- ============ MINI PLAYER (persistent) ============ -->
<div class="mini-player" id="mini-player">
  <div class="mini-progress"><div class="mini-progress-fill" id="mini-progress-fill"></div></div>
  <img class="mini-thumb" id="mini-thumb" src="" alt="">
  <div class="mini-info" id="mini-info-tap">
    <div class="mini-title" id="mini-title">—</div>
    <div class="mini-artist" id="mini-artist">—</div>
  </div>
  <div class="mini-controls">
    <button class="mini-btn" id="mini-prev"><i data-lucide="skip-back"></i></button>
    <button class="mini-btn mini-play" id="mini-play"><i data-lucide="play" id="mini-play-icon"></i></button>
    <button class="mini-btn" id="mini-next"><i data-lucide="skip-forward"></i></button>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
/* ============================================================
   STATE
   ============================================================ */
let library = [];
let currentAlbumIndex = -1;
let currentSongIndex = -1;
let viewAlbumId = null;          // album currently open in album view
let isShuffle = false;
let isRepeat = false;
let loadToken = 0;
let stack = ['view-home'];

const audio = document.getElementById('audio');

/* ============================================================
   ELEMENT REFS
   ============================================================ */
const els = {
  loader: document.getElementById('loader'),
  albumsGrid: document.getElementById('albums-grid'),
  searchInput: document.getElementById('search-input'),
  featureBtn: document.getElementById('feature-btn'),

  albumBack: document.getElementById('album-back'),
  albumHeroImg: document.getElementById('album-hero-img'),
  albumHeroTitle: document.getElementById('album-hero-title'),
  albumHeroSub: document.getElementById('album-hero-sub'),
  songList: document.getElementById('song-list'),

  playerBack: document.getElementById('player-back'),
  exploreBtn: document.getElementById('explore-albums-btn'),
  artworkFrame: document.getElementById('artwork-frame'),
  playerArtwork: document.getElementById('player-artwork'),
  bufferSpinner: document.getElementById('buffer-spinner'),
  playerTitle: document.getElementById('player-title'),
  playerArtist: document.getElementById('player-artist'),
  favBtn: document.getElementById('fav-btn'),
  seekSlider: document.getElementById('seek-slider'),
  rangeFill: document.getElementById('range-fill'),
  timeCurrent: document.getElementById('time-current'),
  timeTotal: document.getElementById('time-total'),
  btnShuffle: document.getElementById('btn-shuffle'),
  btnPrev: document.getElementById('btn-prev'),
  btnPlay: document.getElementById('btn-play'),
  btnNext: document.getElementById('btn-next'),
  btnRepeat: document.getElementById('btn-repeat'),
  playIcon: document.getElementById('play-icon'),

  miniPlayer: document.getElementById('mini-player'),
  miniProgressFill: document.getElementById('mini-progress-fill'),
  miniThumb: document.getElementById('mini-thumb'),
  miniInfoTap: document.getElementById('mini-info-tap'),
  miniTitle: document.getElementById('mini-title'),
  miniArtist: document.getElementById('mini-artist'),
  miniPrev: document.getElementById('mini-prev'),
  miniPlay: document.getElementById('mini-play'),
  miniPlayIcon: document.getElementById('mini-play-icon'),
  miniNext: document.getElementById('mini-next'),
};

const FALLBACK_COVER = 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=600&q=80';

/* ============================================================
   BOOT
   ============================================================ */
window.addEventListener('DOMContentLoaded', () => {
  if (typeof lucide !== 'undefined') lucide.createIcons();

  library = (typeof MUSIC_LIBRARY !== 'undefined' && Array.isArray(MUSIC_LIBRARY)) ? MUSIC_LIBRARY : [];

  if (library.length) {
    renderAlbumsGrid(library);
  } else {
    els.albumsGrid.innerHTML = '<div class="no-results">No albums found.<br>Add some in music-data.js</div>';
  }

  bindEvents();

  setTimeout(() => { els.loader.classList.add('hide'); }, 1400);
});

/* ============================================================
   NAVIGATION (view stack, slide transitions)
   ============================================================ */
function applyPositions(fromId, toId, direction){
  const toEl = document.getElementById(toId);
  toEl.classList.remove('pos-left', 'pos-right');
  toEl.classList.add('pos-center');
  if (fromId && fromId !== toId) {
    const fromEl = document.getElementById(fromId);
    fromEl.classList.remove('pos-center');
    fromEl.classList.add(direction === 'push' ? 'pos-left' : 'pos-right');
  }
}

function pushView(targetId){
  const fromId = stack[stack.length - 1];
  if (fromId === targetId) return;
  stack.push(targetId);
  applyPositions(fromId, targetId, 'push');
}

function popView(){
  if (stack.length < 2) return;
  const fromId = stack.pop();
  const toId = stack[stack.length - 1];
  applyPositions(fromId, toId, 'pop');
}

function resetToHome(){
  const fromId = stack[stack.length - 1];
  if (fromId === 'view-home') return;
  stack = ['view-home'];
  applyPositions(fromId, 'view-home', 'pop');
  setTimeout(() => {
    ['view-album', 'view-player'].forEach(id => {
      if (id === fromId) return;
      const el = document.getElementById(id);
      el.classList.remove('pos-left', 'pos-center');
      el.classList.add('pos-right');
    });
  }, 430);
}

/* ============================================================
   HOME — ALBUMS GRID + SEARCH
   ============================================================ */
function renderAlbumsGrid(albums){
  els.albumsGrid.innerHTML = '';
  if (!albums.length) {
    els.albumsGrid.innerHTML = '<div class="no-results">No matches found</div>';
    return;
  }
  albums.forEach(album => {
    const card = document.createElement('div');
    card.className = 'album-card';
    const cover = album.cover || FALLBACK_COVER;
    const count = (album.songs || []).length;
    card.innerHTML = `
      <img src="${cover}" alt="${escapeHtml(album.title)}" loading="lazy">
      <div class="card-shade"></div>
      <div class="card-count">${count} track${count !== 1 ? 's' : ''}</div>
      <div class="card-label">${escapeHtml(album.title)}</div>
    `;
    card.addEventListener('click', () => openAlbum(album.id));
    els.albumsGrid.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function findAlbumIndex(albumId){
  return library.findIndex(a => a.id === albumId);
}

/* ============================================================
   ALBUM VIEW
   ============================================================ */
function openAlbum(albumId){
  const idx = findAlbumIndex(albumId);
  if (idx === -1) return;
  viewAlbumId = albumId;
  const album = library[idx];

  els.albumHeroImg.src = album.cover || FALLBACK_COVER;
  els.albumHeroTitle.textContent = album.title;
  const count = (album.songs || []).length;
  els.albumHeroSub.textContent = `${count} track${count !== 1 ? 's' : ''}`;

  renderSongList(idx);
  pushView('view-album');
}

function renderSongList(albumIdx){
  const album = library[albumIdx];
  els.songList.innerHTML = '';
  (album.songs || []).forEach((song, songIdx) => {
    const row = document.createElement('div');
    row.className = 'song-row';
    row.id = `song-row-${albumIdx}-${songIdx}`;
    const thumb = song.cover || album.cover || FALLBACK_COVER;
    row.innerHTML = `
      <div class="song-left">
        <span class="song-num">${songIdx + 1}</span>
        <img class="song-thumb" src="${thumb}" alt="">
        <div class="song-meta">
          <div class="song-title">${escapeHtml(song.title)}</div>
          <div class="song-artist">${escapeHtml(song.artist)}</div>
        </div>
      </div>
      <i data-lucide="volume-2" class="song-pulse"></i>
    `;
    row.addEventListener('click', () => {
      playTrack(albumIdx, songIdx);
    });
    els.songList.appendChild(row);
  });
  if (typeof lucide !== 'undefined') lucide.createIcons();
  syncPlayingRowHighlight();
}

function syncPlayingRowHighlight(){
  document.querySelectorAll('.song-row').forEach(r => r.classList.remove('is-playing'));
  if (currentAlbumIndex === -1 || currentSongIndex === -1) return;
  const activeRow = document.getElementById(`song-row-${currentAlbumIndex}-${currentSongIndex}`);
  if (activeRow) activeRow.classList.add('is-playing');
}

/* ============================================================
   PLAYBACK ENGINE — robust, no stuck states
   ============================================================ */
function playTrack(albumIdx, songIdx){
  const album = library[albumIdx];
  if (!album || !album.songs || !album.songs[songIdx]) return;
  const song = album.songs[songIdx];

  const token = ++loadToken;
  currentAlbumIndex = albumIdx;
  currentSongIndex = songIdx;

  setBuffering(true);

  updateNowPlayingUI(album, song);
  showMiniPlayer(true);
  syncPlayingRowHighlight();

  audio.pause();
  audio.currentTime = 0;
  audio.src = song.file;
  audio.load();

  const onReady = () => {
    if (token !== loadToken) return; // stale load, ignore
    audio.removeEventListener('canplay', onReady);
    attemptPlay();
  };
  audio.addEventListener('canplay', onReady);

  updateSeekUI(0, 0);
  els.timeTotal.textContent = '0:00';
}

function attemptPlay(){
  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise
      .then(() => { setPlayingState(true); setBuffering(false); })
      .catch(() => { setPlayingState(false); setBuffering(false); });
  }
}

function togglePlayPause(){
  if (currentAlbumIndex === -1) {
    // nothing loaded yet — start first track of first album
    if (library.length && library[0].songs && library[0].songs.length) {
      playTrack(0, 0);
    }
    return;
  }
  if (audio.paused) {
    attemptPlay();
  } else {
    audio.pause();
    setPlayingState(false);
  }
}

function setBuffering(isBuffering){
  els.artworkFrame.classList.toggle('buffering', isBuffering);
}

function setPlayingState(isPlaying){
  const iconName = isPlaying ? 'pause' : 'play';
  els.btnPlay.classList.toggle('is-playing', isPlaying);
  els.artworkFrame.classList.toggle('playing', isPlaying);
  els.playIcon.setAttribute('data-lucide', iconName);
  els.miniPlayIcon.setAttribute('data-lucide', iconName);
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function updateNowPlayingUI(album, song){
  const cover = song.cover || album.cover || FALLBACK_COVER;

  els.playerTitle.style.opacity = '0';
  els.playerArtist.style.opacity = '0';
  setTimeout(() => {
    els.playerTitle.textContent = song.title;
    els.playerArtist.textContent = song.artist;
    els.playerTitle.style.opacity = '1';
    els.playerArtist.style.opacity = '1';
    els.playerArtwork.src = cover;
  }, 120);

  els.miniTitle.textContent = song.title;
  els.miniArtist.textContent = song.artist;
  els.miniThumb.src = cover;
}

function showMiniPlayer(show){
  els.miniPlayer.classList.toggle('visible', show);
}

function nextTrack(){
  if (currentAlbumIndex === -1) return;
  const album = library[currentAlbumIndex];
  const total = album.songs.length;
  if (isRepeat) {
    audio.currentTime = 0;
    attemptPlay();
    return;
  }
  let nextIdx;
  if (isShuffle && total > 1) {
    do { nextIdx = Math.floor(Math.random() * total); } while (nextIdx === currentSongIndex);
  } else {
    nextIdx = (currentSongIndex + 1) % total;
  }
  playTrack(currentAlbumIndex, nextIdx);
}

function prevTrack(){
  if (currentAlbumIndex === -1) return;
  if (audio.currentTime > 4) {
    audio.currentTime = 0;
    return;
  }
  const album = library[currentAlbumIndex];
  const total = album.songs.length;
  const prevIdx = (currentSongIndex - 1 + total) % total;
  playTrack(currentAlbumIndex, prevIdx);
}

/* ---------------- audio element events ---------------- */
audio.addEventListener('timeupdate', () => {
  if (isNaN(audio.duration) || !isFinite(audio.duration)) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  updateSeekUI(audio.currentTime, pct);
});
audio.addEventListener('loadedmetadata', () => {
  els.timeTotal.textContent = formatTime(audio.duration);
});
audio.addEventListener('waiting', () => setBuffering(true));
audio.addEventListener('playing', () => { setBuffering(false); setPlayingState(true); });
audio.addEventListener('pause', () => { if (!audio.ended) setPlayingState(false); });
audio.addEventListener('ended', () => { nextTrack(); });
audio.addEventListener('error', () => { setBuffering(false); });

function updateSeekUI(currentTime, pct){
  els.seekSlider.value = pct;
  els.rangeFill.style.width = pct + '%';
  els.timeCurrent.textContent = formatTime(currentTime);
  els.miniProgressFill.style.width = pct + '%';
}

function formatTime(seconds){
  if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

/* ============================================================
   EVENT BINDINGS
   ============================================================ */
function bindEvents(){
  // search
  els.searchInput.addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { renderAlbumsGrid(library); return; }
    const filtered = library.filter(album => {
      if (album.title.toLowerCase().includes(q)) return true;
      return (album.songs || []).some(s =>
        s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
      );
    });
    renderAlbumsGrid(filtered);
  });

  // feature artist button -> instagram
  els.featureBtn.addEventListener('click', () => {
    window.open('https://instagram.com/f1.yuvraj', '_blank', 'noopener');
  });

  // album view navigation
  els.albumBack.addEventListener('click', popView);
  els.playerBack.addEventListener('click', popView);
  els.exploreBtn.addEventListener('click', resetToHome);

  // mini player tap -> open player view
  els.miniInfoTap.addEventListener('click', () => pushView('view-player'));
  els.miniThumb.addEventListener('click', () => pushView('view-player'));

  // mini controls
  els.miniPlay.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
  els.miniPrev.addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });
  els.miniNext.addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });

  // player controls
  els.btnPlay.addEventListener('click', togglePlayPause);
  els.btnPrev.addEventListener('click', prevTrack);
  els.btnNext.addEventListener('click', nextTrack);
  els.btnShuffle.addEventListener('click', () => {
    isShuffle = !isShuffle;
    els.btnShuffle.classList.toggle('active', isShuffle);
  });
  els.btnRepeat.addEventListener('click', () => {
    isRepeat = !isRepeat;
    els.btnRepeat.classList.toggle('active', isRepeat);
  });
  els.favBtn.addEventListener('click', () => els.favBtn.classList.toggle('active'));

  // seek slider
  els.seekSlider.addEventListener('input', (e) => {
    if (!audio.duration) return;
    const pct = e.target.value;
    els.rangeFill.style.width = pct + '%';
    els.timeCurrent.textContent = formatTime((pct / 100) * audio.duration);
  });
  els.seekSlider.addEventListener('change', (e) => {
    if (!audio.duration) return;
    audio.currentTime = (e.target.value / 100) * audio.duration;
  });
}
</script>
</body>
</html>
