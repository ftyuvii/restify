<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Explore Albums</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/style.css">
<script src="https://unpkg.com/lucide@latest" defer></script>
<style>
html, body { height: auto; min-height: 100%; width: 100%; overflow-y: auto; display: block; }
body { background: var(--bg); }
</style>
</head>
<body>

<div class="frame-page-body">
  <div class="frame-intro">
    <h1>Explore Albums</h1>
    <p>Browse every album on Restify in one clean grid. Tap a cover to start listening instantly.</p>
  </div>

  <div class="albums-showcase-container" style="margin-top:0;padding-left:20px;padding-right:20px;">
    <div class="modern-albums-mesh" id="albums-mesh"></div>
    <div class="frame-empty" id="albums-empty" style="display:none;">
      <i data-lucide="disc-3"></i>
      <div>No albums found yet. New albums will appear here automatically.</div>
    <a class="side-menu-item active" href="index.html" data-page="home">
      <i data-lucide="home"></i>
      <span>Home</span>
    </a>
    <a class="side-menu-item" href="pages/albums.html" data-page="albums" data-title="Explore Albums">
      <i data-lucide="layout-grid"></i>
      <span>Explore Albums</span>
    </a>
    <a class="side-menu-item" href="pages/announces.html" data-page="whatsnew" data-title="What's New">
      <i data-lucide="bell"></i>
      <span>What's New</span>
      <span class="menu-dot"></span>
    </a>
    <a class="side-menu-item" href="pages/artistforums.html" data-page="about" data-title="About Us">
      <i data-lucide="user-round"></i>
      <span>About Us</span>
    </a>
    </div>
  </div>
</div>

<script>
function getMusicData() {
  try { return window.parent.MUSIC_DATA || null; } catch (e) { return null; }
}

function firstSong(album, data) {
  if (!album.songIds || !album.songIds.length) return null;
  return data.songs.find(s => s.id === album.songIds[0]) || null;
}

function playAlbum(album, data) {
  const songs = (album.songIds || []).map(id => data.songs.find(s => s.id === id)).filter(Boolean);
  if (!songs.length) return;
  try {
    if (window.parent.RestifyBridge && window.parent.RestifyBridge.openAlbum) {
      window.parent.RestifyBridge.openAlbum(album.id);
      return;
    }
    window.parent.Restify.playQueue(songs, 0);
  } catch (e) {}
}

function renderAlbums() {
  const data = getMusicData();
  const mesh = document.getElementById('albums-mesh');
  const empty = document.getElementById('albums-empty');
  if (!data || !data.albums || !data.albums.length) {
    empty.style.display = 'block';
    if (window.lucide) lucide.createIcons();
    return;
  }
  mesh.innerHTML = data.albums.map(album => `
    <div class="mesh-album-card" data-id="${album.id}">
      <div class="mesh-cover-wrap">
        <img src="${album.cover}" alt="${album.title}">
        <div class="mesh-play-overlay"><i data-lucide="play"></i></div>
      </div>
      <div class="mesh-meta">
        <div class="mesh-title">${album.title}</div>
        <div class="mesh-artist">${album.artist}</div>
      </div>
    </div>
  `).join('');
  mesh.querySelectorAll('.mesh-album-card').forEach(card => {
    card.addEventListener('click', () => {
      const album = data.albums.find(a => String(a.id) === card.dataset.id);
      if (album) playAlbum(album, data);
    });
  });
  if (window.lucide) lucide.createIcons();
}

renderAlbums();
window.addEventListener('restify-data-ready', renderAlbums);
</script>

</body>
</html>
