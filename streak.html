<!DOCTYPE html>
<html lang="en" class="streak-page">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Restify — Streak</title>
<meta name="description" content="Your daily Restify listening streak — keep it alive and download a weekly streak card.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<link rel="stylesheet" href="src/style.css">
</head>
<body class="streak-page">

<a class="sk-standalone-back" href="../index.html" id="standalone-back" data-standalone-only>
  <i data-lucide="chevron-left"></i>Back to Restify
</a>

<div class="sk-wrap">

  <div class="sk-brand-row">
    <img src="../src/icon.svg" alt="Restify" class="sk-logo">
    <div>
      <div class="sk-kicker">Restify</div>
      <h1>Your streak</h1>
    </div>
  </div>

  <div class="sk-hero" id="sk-hero">
    <div class="sk-flame"><i data-lucide="flame"></i></div>
    <div class="sk-streak-num" id="sk-current">0</div>
    <div class="sk-streak-label">day streak</div>
    <div class="sk-longest">Longest streak: <span id="sk-longest">0</span> days</div>
  </div>

  <div class="sk-week-card">
    <div class="sk-week-head">
      <span>This week</span>
      <span id="sk-week-progress">Day 0 / 7</span>
    </div>
    <div class="sk-week-grid" id="sk-week-grid"></div>
  </div>

  <button class="sk-btn sk-btn-ghost" id="sk-log-btn">
    <i data-lucide="plus"></i>Log today's listen
  </button>
  <p class="sk-hint">Temporary control — hook this up to your actual play event and it logs itself. See the code comment near <code>recordListen()</code>.</p>

  <div class="sk-report-card" id="sk-report-card">
    <div class="sk-rc-mark"><img src="../src/icon.svg" alt=""><span>RESTIFY</span></div>
    <div class="sk-rc-date" id="sk-rc-date">—</div>
    <div class="sk-rc-flame"><i data-lucide="flame"></i></div>
    <div class="sk-rc-num" id="sk-rc-current">0</div>
    <div class="sk-rc-label">day streak</div>
    <div class="sk-rc-week" id="sk-rc-week"></div>
    <div class="sk-rc-foot">restify · streak report</div>
  </div>

  <button class="sk-btn sk-btn-primary" id="sk-download-btn">
    <i data-lucide="download"></i>Download streak card
  </button>

</div>

<div class="sk-toast" id="sk-toast"><i data-lucide="check-circle"></i><span id="sk-toast-text">Saved</span></div>

<script>
/* ==========================================================================
   Streak tracking — localStorage-backed, same-origin as index.html so the
   data is already shared with the main app without any extra plumbing.

   Key: restify_streak_v1  ->  { lastDate, current, longest, log:{date:true} }

   CONNECTING THIS TO REAL PLAYBACK
   ---------------------------------
   This page can only react to a listen when it happens to be open. The
   button below ("Log today's listen") is a manual stand-in for testing.
   For it to track real usage, call the same recording logic from
   engine/app.js instead — e.g. in the <audio> element's 'ended' handler
   (or after N seconds of playback, your call):

     audio.addEventListener('ended', () => {
       // duplicate of RestifyStreak.recordListen() below, or read/write
       // the same 'restify_streak_v1' localStorage key directly —
       // it's the same origin as this page so no messaging needed.
     });

   That keeps the streak accurate even when a user never opens this page.
   ========================================================================== */

const STREAK_KEY = 'restify_streak_v1';

function todayId(d = new Date()) {
  return d.toISOString().slice(0, 10);
}
function dateFromId(id) {
  const [y, m, d] = id.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function addDays(id, n) {
  const d = dateFromId(id);
  d.setDate(d.getDate() + n);
  return todayId(d);
}

function loadStreak() {
  let data = { lastDate: null, current: 0, longest: 0, log: {} };
  try {
    const saved = JSON.parse(localStorage.getItem(STREAK_KEY));
    if (saved) data = saved;
  } catch (e) {}

  // If the last logged day is older than yesterday, the streak is broken —
  // reset the running count, but keep the history for the week grid.
  const today = todayId();
  const yesterday = addDays(today, -1);
  if (data.lastDate && data.lastDate !== today && data.lastDate !== yesterday) {
    data.current = 0;
  }
  return data;
}

function saveStreak(data) {
  localStorage.setItem(STREAK_KEY, JSON.stringify(data));
}

function recordListen() {
  const data = loadStreak();
  const today = todayId();
  if (data.log[today]) return data; // already counted today

  const yesterday = addDays(today, -1);
  data.current = (data.lastDate === yesterday) ? data.current + 1 : 1;
  data.lastDate = today;
  data.log[today] = true;
  data.longest = Math.max(data.longest || 0, data.current);

  // trim history to the last 30 days so the object doesn't grow forever
  const cutoff = addDays(today, -30);
  Object.keys(data.log).forEach(id => { if (id < cutoff) delete data.log[id]; });

  saveStreak(data);
  return data;
}

// Exposed so engine/app.js (or a future Supabase sync layer) can call this
// directly if it's ever loaded in the same document context.
window.RestifyStreak = { recordListen, getState: loadStreak };

function last7Days() {
  const today = todayId();
  const days = [];
  for (let i = 6; i >= 0; i--) days.push(addDays(today, -i));
  return days;
}

function render() {
  const data = loadStreak();
  const today = todayId();

  document.getElementById('sk-current').textContent = data.current;
  document.getElementById('sk-longest').textContent = data.longest;

  const dayInWeek = data.current === 0 ? 0 : ((data.current - 1) % 7) + 1;
  document.getElementById('sk-week-progress').textContent = `Day ${dayInWeek} / 7`;

  const days = last7Days();
  const dow = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  document.getElementById('sk-week-grid').innerHTML = days.map(id => {
    const d = dateFromId(id);
    const done = !!data.log[id];
    const isToday = id === today;
    return `<div class="sk-day ${done ? 'done' : ''} ${isToday ? 'today' : ''}">
      <div class="sk-dot">${done ? '<i data-lucide="check"></i>' : ''}</div>
      <div class="sk-day-label">${dow[d.getDay()]}</div>
    </div>`;
  }).join('');

  // Report card
  document.getElementById('sk-rc-date').textContent = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('sk-rc-current').textContent = data.current;
  document.getElementById('sk-rc-week').innerHTML = days.map(id => {
    const done = !!data.log[id];
    return `<span class="sk-rc-pip ${done ? 'done' : ''}"></span>`;
  }).join('');

  if (window.lucide) lucide.createIcons();
}

document.getElementById('sk-log-btn').addEventListener('click', () => {
  recordListen();
  render();
  showToast('Logged today\u2019s listen');
});

let toastTimer;
function showToast(text) {
  const t = document.getElementById('sk-toast');
  document.getElementById('sk-toast-text').textContent = text;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

document.getElementById('sk-download-btn').addEventListener('click', async () => {
  const el = document.getElementById('sk-report-card');
  if (typeof html2canvas === 'undefined') { showToast('Could not load image renderer'); return; }
  try {
    const canvas = await html2canvas(el, { backgroundColor: null, scale: 3 });
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = `restify-streak-${todayId()}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    showToast('Streak card downloaded');
  } catch (err) {
    showToast('Download failed — try again');
  }
});

// This page normally loads inside index.html's iframe (view-frame), which
// already shows its own back arrow + "Streak" title above this content.
// When embedded, hide this page's own logo/title row so it doesn't look
// like a second header stacked under index's — show it (and the back
// link) only when this file is opened directly/standalone.
if (window.self === window.top) {
  document.getElementById('standalone-back').style.display = 'flex';
} else {
  document.body.classList.add('embedded');
}

/* ==========================================================================
   SUPABASE — not wired up here, left for you to build. Notes:

   1. Client init (once, shared across pages):
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

   2. Suggested table `streaks`:
        user_id      uuid references auth.users primary key
        current      int
        longest      int
        last_date    date
        log          jsonb        -- same shape as the localStorage log above
        updated_at   timestamptz default now()
      RLS: only the owning user can select/update their own row.

   3. Sync strategy:
        - On login: fetch the row, merge with whatever's in localStorage
          (take the higher `current`/`longest`, union the `log` objects),
          write the merged result back to both localStorage and Supabase.
        - On recordListen(): after saving to localStorage, upsert the same
          object to Supabase (debounce if you want to avoid spamming writes).
        - Signed-out users keep working off localStorage only, same as now.
   ========================================================================== */

document.addEventListener('DOMContentLoaded', render);
window.addEventListener('load', () => { if (window.lucide) lucide.createIcons(); });
</script>

</body>
</html>
